name: Sync, Build & Deploy WS4KP

on:
  schedule:
    - cron: '30 6 * * *'  # Every night at 2:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v2
        with:
          ref: main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global merge.ours.driver true

      - name: Merge upstream/main into main
        run: |
          git remote add upstream https://github.com/netbymatt/ws4kp.git || true
          git fetch upstream
          git merge upstream/main --no-edit --allow-unrelated-histories -Xours || true
          git push origin main || true

  build-deploy:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Ensure CNAME file is present
        run: echo "weather.updog.cool" > dist/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
