name: Sync, Build & Deploy WS4KP

on:
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      did_sync_change: ${{ steps.sync.outputs.did_sync_change }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v2
        with:
          ref: main

      - name: Sync upstream safely
        id: sync
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global merge.ours.driver true

          git remote add upstream https://github.com/netbymatt/ws4kp.git || true
          git fetch upstream
          git fetch origin

          MAIN_HASH=$(git rev-parse origin/main)
          UPSTREAM_HASH=$(git rev-parse upstream/main)
          COMBINED_HASH=$(echo "${MAIN_HASH}${UPSTREAM_HASH}" | sha1sum | cut -d' ' -f1)
          echo "Combined hash: $COMBINED_HASH"

          HASH_FILE=".github/ws4kp.last_hash"
          mkdir -p .github

          if [[ -f "$HASH_FILE" ]]; then
            LAST_HASH=$(cat "$HASH_FILE")
          else
            LAST_HASH="none"
          fi

          if [[ "$COMBINED_HASH" == "$LAST_HASH" ]]; then
            echo "No changes. Skipping sync."
            echo "did_sync_change=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changes detected. Proceeding with merge."
          git checkout main
          git merge upstream/main --ff-only || \
            git merge upstream/main --no-edit --allow-unrelated-histories -Xours

          git push origin main
          echo "$COMBINED_HASH" > "$HASH_FILE"

          echo "did_sync_change=true" >> $GITHUB_OUTPUT

  build-deploy:
    needs: sync
    if: needs.sync.outputs.did_sync_change == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Ensure CNAME file is present
        run: echo "weather.updog.cool" > dist/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
